<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0f1e" />
  <title>Offline – Encompass Aviation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0a0f1e;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 360px; }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f59e0b;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #94a3b8;
    }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #f59e0b;
      color: #0a0f1e;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #fbbf24; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✈️</div>
    <h1>You're Offline</h1>
    <p>Please reconnect to access Encompass Aviation.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
